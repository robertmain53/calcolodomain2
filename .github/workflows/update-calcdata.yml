name: Update CalcDomain Data

on:
  push:
    branches: [ main, master ]
    # Fai partire quando tocchi HTML, lo YAML del workflow, gli script
    paths:
      - '**/*.html'
      - '.github/workflows/update-calcdata.yml'
      - 'tools/**'
      - 'generate_data_files.py'
    # Evita loop quando il bot committa i file generati
    paths-ignore:
      - 'calculators-data.json'
      - 'sitemap.xml'
      - 'robots.txt'
  workflow_dispatch: {}
  schedule:
    - cron: '17 2 * * *'   # 02:17 UTC

permissions:
  contents: write
  actions: read
  pull-requests: write

concurrency:
  group: calcdomain-data-${{ github.ref }}
  cancel-in-progress: true

env:
  BASE_URL: https://calcdomain.com
  SRC_DIR: .
  RUN_LINK_CHECK: "true"

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: |
            requirements.txt
            tools/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f tools/requirements.txt ]; then pip install -r tools/requirements.txt; fi
          sudo apt-get update -y
          sudo apt-get install -y jq

      - name: Check for data generation script
        run: |
          test -f generate_data_files.py || { echo "❌ generate_data_files.py mancante"; exit 1; }

      - name: Generate calculators-data.json
        run: |
          echo "📄 Generando calculators-data.json..."
          python generate_data_files.py --base-url "$BASE_URL" --dir "$SRC_DIR"
          if [ -f calculators-data.json ] && jq -e . calculators-data.json >/dev/null 2>&1; then
            tmp=$(mktemp) && jq -S . calculators-data.json > "$tmp" && mv "$tmp" calculators-data.json
          fi

      - name: Validate sitemap.xml (well-formed XML)
        run: |
          if [ -f sitemap.xml ]; then
            python - << 'PY'
import sys, xml.etree.ElementTree as ET
try:
    ET.parse('sitemap.xml')
    print('✅ sitemap.xml XML well-formed')
except Exception as e:
    print('❌ sitemap.xml non valido:', e)
    sys.exit(1)
PY
          else
            echo "ℹ️ sitemap.xml non presente (skipping)"
          fi

      - name: Quick internal link check (write report)
        if: env.RUN_LINK_CHECK == 'true'
        id: linkcheck
        run: |
          set +e
          mkdir -p reports
          python - << 'PY' > reports/link-check.txt
import os, re, sys, pathlib
bad = []
for root,_,files in os.walk('.'):
    for f in files:
        if f.endswith('.html'):
            p=os.path.join(root,f)
            try:
                s=open(p,encoding='utf-8',errors='ignore').read()
            except:
                continue
            for href in re.findall(r'href="([^"]+)"', s):
                if href.startswith(('http://','https://','#','mailto:')):
                    continue
                t=os.path.normpath(os.path.join(root, href.split('#')[0]))
                if not os.path.exists(t):
                    bad.append((p, href))
pathlib.Path('reports').mkdir(exist_ok=True)
if bad:
    print('❌ Broken internal links:')
    for p,h in bad:
        print(f'- {p} -> {h}')
    sys.exit(2)
else:
    print('✅ No broken internal links')
PY
          CODE=$?
          set -e
          if [ "$CODE" -eq 2 ]; then
            echo "broken=true" >> $GITHUB_OUTPUT
          else
            echo "broken=false" >> $GITHUB_OUTPUT
          fi

      - name: Upload link-check report
        if: env.RUN_LINK_CHECK == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: link-check-report
          path: reports/link-check.txt

      - name: Link-check summary
        if: env.RUN_LINK_CHECK == 'true'
        run: |
          echo "## 🔗 Internal Link Check" >> $GITHUB_STEP_SUMMARY
          if grep -q "❌ Broken internal links" reports/link-check.txt; then
            echo "Trovati link rotti. Vedi artifact **link-check-report**." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            head -n 50 reports/link-check.txt >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ Nessun link interno rotto rilevato." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Fail if broken links were found
        if: env.RUN_LINK_CHECK == 'true' && steps.linkcheck.outputs.broken == 'true'
        run: |
          echo "❌ Broken internal links found. Vedi 'link-check-report'." >&2
          exit 1

      - name: Check for changes
        id: verify-changed-files
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "✅ Rilevate modifiche nei file generati"
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "ℹ️ Nessuna modifica rilevata"
          fi

      - name: Display file stats
        if: steps.verify-changed-files.outputs.has_changes == 'true'
        id: stats
        run: |
          echo "📊 Statistiche file aggiornati:"
          CALC_COUNT=0
          URL_COUNT=0
          if [ -f "calculators-data.json" ]; then
            echo "calculators-data.json: $(wc -l < calculators-data.json) righe"
            CALC_COUNT=$(grep -o '"slug":' calculators-data.json | wc -l || echo "0")
            echo "Numero calcolatori: $CALC_COUNT"
          fi
          if [ -f "sitemap.xml" ]; then
            URL_COUNT=$(grep -c '<url>' sitemap.xml || echo "0")
            echo "sitemap.xml URL: $URL_COUNT"
          fi
          if [ -f "robots.txt" ]; then
            echo "robots.txt: $(wc -l < robots.txt) righe"
          fi
          echo "calc_count=$CALC_COUNT" >> $GITHUB_OUTPUT
          echo "url_count=$URL_COUNT" >> $GITHUB_OUTPUT

      - name: Commit and push changes
        if: steps.verify-changed-files.outputs.has_changes == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add calculators-data.json sitemap.xml robots.txt || true
          TIMESTAMP=$(date '+%Y-%m-%d %H:%M:%S %Z')
          CALC_COUNT="${{ steps.stats.outputs.calc_count }}"
          URL_COUNT="${{ steps.stats.outputs.url_count }}"
          git commit -m "🤖 Auto-update: data refreshed
- calculators-data.json: ${CALC_COUNT:-0}
- sitemap.xml: ${URL_COUNT:-0_
