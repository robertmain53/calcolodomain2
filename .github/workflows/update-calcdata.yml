name: Update CalcDomain Data

on:
  push:
    branches: [ main, master ]
    paths:
      - "**/*.html"
      - ".github/workflows/update-calcdata.yml"
      - "tools/**"
      - "generate_data_files.py"
  workflow_dispatch:
  schedule:
    - cron: "17 2 * * *"

permissions:
  contents: write
  actions: read
  pull-requests: write

concurrency:
  group: calcdomain-data-${{ github.ref }}
  cancel-in-progress: true

env:
  BASE_URL: https://calcdomain.com
  SRC_DIR: .
  RUN_LINK_CHECK: "true"

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f tools/requirements.txt ]; then pip install -r tools/requirements.txt; fi
          sudo apt-get update -y
          sudo apt-get install -y jq

      - name: Check for generator
        run: |
          if [ ! -f generate_data_files.py ]; then
            echo "❌ generate_data_files.py mancante"
            exit 1
          fi

      - name: Generate calculators-data.json
        run: |
          echo "📄 Generando calculators-data.json..."
          python generate_data_files.py --base-url "$BASE_URL" --dir "$SRC_DIR"
          if [ -f calculators-data.json ]; then
            if jq -e . calculators-data.json >/dev/null 2>&1; then
              tmp=$(mktemp)
              jq -S . calculators-data.json > "$tmp"
              mv "$tmp" calculators-data.json
            fi
          fi

      - name: Validate sitemap.xml
        run: |
          if [ -f sitemap.xml ]; then
            python -c "import xml.etree.ElementTree as ET; ET.parse('sitemap.xml') or None; print('✅ sitemap.xml XML well-formed')" || exit 1
          else
            echo "ℹ️ sitemap.xml non presente (skipping)"
          fi
      - name: Link check - write reporter script
        if: env.RUN_LINK_CHECK == 'true'
        run: |
          mkdir -p tools
          cat > tools/_link_check.py <<'PYCODE'
          import os, re, sys, pathlib
          bad = []
          for root, _, files in os.walk('.'):
              for f in files:
                  if f.endswith('.html'):
                      p = os.path.join(root, f)
                      try:
                          s = open(p, encoding='utf-8', errors='ignore').read()
                      except Exception:
                          continue
                      for href in re.findall(r'href="([^"]+)"', s):
                          if href.startswith(('http://','https://','#','mailto:')):
                              continue
                          t = os.path.normpath(os.path.join(root, href.split('#')[0]))
                          if not os.path.exists(t):
                              bad.append((p, href))
          pathlib.Path('reports').mkdir(exist_ok=True)
          with open('reports/link-check.txt', 'w', encoding='utf-8') as fp:
              if bad:
                  fp.write('❌ Broken internal links:\n')
                  for p,h in bad:
                      fp.write(f'- {p} -> {h}\n')
                  sys.exit(2)
              else:
                  fp.write('✅ No broken internal links\n')
          PYCODE


      - name: Link check - run
        if: env.RUN_LINK_CHECK == 'true'
        id: linkcheck
        run: |
          set +e
          mkdir -p reports
          python tools/_link_check.py
          CODE=$?
          set -e
          if [ "$CODE" -eq 2 ]; then
            echo "broken=true" >> "$GITHUB_OUTPUT"
          else
            echo "broken=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload link-check report
        if: env.RUN_LINK_CHECK == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: link-check-report
          path: reports/link-check.txt

      - name: Link-check summary
        if: env.RUN_LINK_CHECK == 'true'
        run: |
          echo "## 🔗 Internal Link Check" >> "$GITHUB_STEP_SUMMARY"
          if grep -q "❌ Broken internal links" reports/link-check.txt; then
            echo "Trovati link rotti. Vedi artifact **link-check-report**." >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            head -n 50 reports/link-check.txt >> "$GITHUB_STEP_SUMMARY" || true
          else
            echo "✅ Nessun link interno rotto rilevato." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Fail if broken
        if: env.RUN_LINK_CHECK == 'true' && steps.linkcheck.outputs.broken == 'true'
        run: |
          echo "❌ Broken internal links found. Vedi 'link-check-report'." >&2
          exit 1

      - name: Check for changes
        id: verify-changed-files
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Display file stats
        if: steps.verify-changed-files.outputs.has_changes == 'true'
        id: stats
        run: |
          CALC_COUNT=0
          URL_COUNT=0
          if [ -f "calculators-data.json" ]; then
            CALC_COUNT=$(grep -o '"slug":' calculators-data.json | wc -l || echo "0")
          fi
          if [ -f "sitemap.xml" ]; then
            URL_COUNT=$(grep -c '<url>' sitemap.xml || echo "0")
          fi
          echo "calc_count=$CALC_COUNT" >> "$GITHUB_OUTPUT"
          echo "url_count=$URL_COUNT" >> "$GITHUB_OUTPUT"

      - name: Commit and push changes
        if: steps.verify-changed-files.outputs.has_changes == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add calculators-data.json sitemap.xml robots.txt || true
          TIMESTAMP=$(date '+%Y-%m-%d %H:%M:%S %Z')
          CALC_COUNT="${{ steps.stats.outputs.calc_count }}"
          URL_COUNT="${{ steps.stats.outputs.url_count }}"
          git commit -m "🤖 Auto-update: data refreshed\n- calculators-data.json: ${CALC_COUNT:-0}\n- sitemap.xml: ${URL_COUNT:-0}\n- ${TIMESTAMP}\n[skip ci]" || echo "No changes to commit"
          git push

      - name: Upload artifacts
        if: steps.verify-changed-files.outputs.has_changes == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: generated-data
          path: |
            calculators-data.json
            sitemap.xml
            robots.txt

      - name: Summary
        if: steps.verify-changed-files.outputs.has_changes == 'true'
        run: |
          echo "🎉 CalcDomain data update completed!" >> "$GITHUB_STEP_SUMMARY"
          echo "## Updated Files" >> "$GITHUB_STEP_SUMMARY"
          [ -f calculators-data.json ] && echo "- ✅ calculators-data.json" >> "$GITHUB_STEP_SUMMARY"
          [ -f sitemap.xml ] && echo "- ✅ sitemap.xml" >> "$GITHUB_STEP_SUMMARY"
          [ -f robots.txt ] && echo "- ✅ robots.txt" >> "$GITHUB_STEP_SUMMARY"
          echo "## Statistics" >> "$GITHUB_STEP_SUMMARY"
          echo "- 📊 Total calculators: ${{ steps.stats.outputs.calc_count || 0 }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- 🗺️ Sitemap URLs: ${{ steps.stats.outputs.url_count || 0 }}" >> "$GITHUB_STEP_SUMMARY"
