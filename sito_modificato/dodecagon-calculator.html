            <section class="prose">
              <h2>Regular decagon formulas</h2>
              <p>Let \( s \) be the side of a regular decagon (10 equal sides):</p>
              <div class="formula-box">
                <p><strong>Perimeter:</strong> \( P = 10s \)</p>
                <p><strong>Area:</strong> \( A = \frac{5}{2} s^2 \sqrt{5 + 2\sqrt{5}} \approx 7.69420884\, s^2 \)</p>
                <p><strong>Inradius (apothem):</strong> \( r = \dfrac{s}{2 \tan(\pi/10)} \)</p>
                <p><strong>Circumradius:</strong> \( R = \dfrac{s}{2 \sin(\pi/10)} \approx 1.618\, s \)</p>
              </div>
              <p>The angle \( \pi/10 \) is 18°, so the decagon is closely linked to the golden ratio \( \varphi \approx 1.618 \).</p>

              <h3>From circumference to decagon</h3>
              <p>If you know the radius of the circle that the decagon is inscribed in, use \( s = 2R \sin(\pi/10) \) then apply the area formula.</p>

              <h2>FAQ</h2>
              <h3>Does this work for irregular decagons?</h3>
              <p>No, because irregular decagons need more data (sides or coordinates). This tool follows the regular case like most online decagon calculators.</p>
            </section>

      function toMeters(val, unit) {
        const v = parseFloat(val);
        if (isNaN(v) || v < 0) return NaN;
        switch (unit) {
          case 'mm': return v / 1000;
          case 'cm': return v / 100;
          case 'm': return v;
          case 'in': return v * 0.0254;
          case 'ft': return v * 0.3048;
          default: return v;
        }
      }
      function fromMeters(m, unit) {
        switch (unit) {
          case 'mm': return m * 1000;
          case 'cm': return m * 100;
          case 'm': return m;
          case 'in': return m / 0.0254;
          case 'ft': return m / 0.3048;
          default: return m;
        }
      }

      function calculateDecagon() {
        const known = knownEl.value;
        const rawVal = parseFloat(valueEl.value);
        const unit = unitEl.value;

        // constants
        const areaConst = 0.5 * 5 * Math.sqrt(5 + 2 * Math.sqrt(5)); // (5/2)*sqrt(5+2√5)
        const tanPi10 = Math.tan(Math.PI / 10); // tan 18°
        const sinPi10 = Math.sin(Math.PI / 10); // sin 18°

        let side_m = NaN;
        let steps = '';

        if (known === 'side') {
          side_m = toMeters(rawVal, unit);
          steps += `Given side s = ${rawVal} ${unit}.\n`;
        } else if (known === 'perimeter') {
          const P_m = toMeters(rawVal, unit);
          side_m = P_m / 10;
          steps += `Given perimeter P = ${rawVal} ${unit}.\nSide s = P / 10 = ${side_m.toFixed(6)} m.\n`;
        } else if (known === 'area') {
          // area is in unit^2 → convert to m²
          let A_m2 = rawVal;
          if (unit === 'mm') A_m2 = rawVal / 1e6;
          else if (unit === 'cm') A_m2 = rawVal / 1e4;
          else if (unit === 'in') A_m2 = rawVal * 0.00064516;
          else if (unit === 'ft') A_m2 = rawVal * 0.09290304;
          steps += `Given area A = ${rawVal} ${unit}².\n`;
          side_m = Math.sqrt(A_m2 / areaConst);
          steps += `s = sqrt(A / ((5/2)√(5+2√5))) = ${side_m.toFixed(6)} m.\n`;
        } else if (known === 'inradius') {
          const r_m = toMeters(rawVal, unit);
          // r = s / (2 tan(π/10)) → s = 2 r tan(π/10)
          side_m = 2 * r_m * tanPi10;
          steps += `Given inradius r = ${rawVal} ${unit}.\nFor regular decagon r = s/(2 tan(π/10)) → s = 2 r tan(π/10).\n`;
        } else if (known === 'circumradius') {
          const R_m = toMeters(rawVal, unit);
          // R = s / (2 sin(π/10)) → s = 2 R sin(π/10)
          side_m = 2 * R_m * sinPi10;
          steps += `Given circumradius R = ${rawVal} ${unit}.\nFor regular decagon R = s/(2 sin(π/10)) → s = 2 R sin(π/10).\n`;
        }

        if (isNaN(side_m) || side_m <= 0) {
          resSide.textContent = '—';
          resSideAlt.textContent = '—';
          resPerimeter.textContent = '—';
          resPerimeterAlt.textContent = '—';
          resArea.textContent = '—';
          resAreaAlt.textContent = '—';
          resInradius.textContent = '—';
          resInradiusAlt.textContent = '—';
          resCircumradius.textContent = '—';
          resCircumradiusAlt.textContent = '—';
          resSteps.textContent = 'Enter a positive value.';
          return;
        }

        // compute all
        const perimeter_m = 10 * side_m;
        const area_m2 = areaConst * side_m * side_m;
        const inradius_m = side_m / (2 * tanPi10);
        const circumradius_m = side_m / (2 * sinPi10);

        // output in chosen unit
        resSide.textContent = fromMeters(side_m, unit).toFixed(6).replace(/\.?0+$/,'') + ' ' + unit;
        resSideAlt.textContent = side_m.toFixed(6) + ' m';

        resPerimeter.textContent = fromMeters(perimeter_m, unit).toFixed(6).replace(/\.?0+$/,'') + ' ' + unit;
        resPerimeterAlt.textContent = perimeter_m.toFixed(6) + ' m';

        // area convert to unit²
        let areaInUnit = area_m2;
        if (unit === 'mm') areaInUnit = area_m2 * 1e6;
        else if (unit === 'cm') areaInUnit = area_m2 * 1e4;
        else if (unit === 'in') areaInUnit = area_m2 / 0.00064516;
        else if (unit === 'ft') areaInUnit = area_m2 / 0.09290304;

        resArea.textContent = areaInUnit.toFixed(6).replace(/\.?0+$/,'') + ' ' + unit + '²';
        resAreaAlt.textContent = area_m2.toFixed(6) + ' m²';

        resInradius.textContent = fromMeters(inradius_m, unit).toFixed(6).replace(/\.?0+$/,'') + ' ' + unit;
        resInradiusAlt.textContent = inradius_m.toFixed(6) + ' m';

        resCircumradius.textContent = fromMeters(circumradius_m, unit).toFixed(6).replace(/\.?0+$/,'') + ' ' + unit;
        resCircumradiusAlt.textContent = circumradius_m.toFixed(6) + ' m';

        steps += `Perimeter P = 10s = ${perimeter_m.toFixed(6)} m.\n`;
        steps += `Area A = (5/2)s²√(5+2√5) = ${area_m2.toFixed(6)} m².\n`;
        steps += `Inradius r = s / (2 tan(π/10)) = ${inradius_m.toFixed(6)} m.\n`;
        steps += `Circumradius R = s / (2 sin(π/10)) = ${circumradius_m.toFixed(6)} m.\n`;
        resSteps.textContent = steps;
      }

      document.getElementById('calc-btn').addEventListener('click', calculateDecagon);
      calculateDecagon();
    </script>

        svg: { fontCache: 'global' }
      };
    </script>
