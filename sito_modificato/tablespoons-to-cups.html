    <script>
      // Conversion factors by system (tbsp per cup)
      const factors = {
        us: 16,
        metric: 250 / 15, // ≈ 16.6667
        uk: 284 / 15      // ≈ 18.9333
      };

      const systemSelect = document.getElementById('system-select');
      const tbspInput = document.getElementById('tbsp-input');
      const cupsInput = document.getElementById('cups-input');
      const swapBtn = document.getElementById('swap-btn');
      const cupsFraction = document.getElementById('cups-fraction');

      let direction = 'tbsp-to-cups'; // or 'cups-to-tbsp'

      function toFraction(value) {
        if (!isFinite(value) || value === 0) return '—';
        const denominators = [2, 3, 4, 8, 16];
        const rounded = Math.round(value * 10000) / 10000;
        const whole = Math.floor(rounded);
        const frac = rounded - whole;
        let best = { diff: Infinity, text: '' };
        denominators.forEach(d => {
          const n = Math.round(frac * d);
          const approx = n / d;
          const diff = Math.abs(frac - approx);
          if (n !== 0 && diff < best.diff) {
            best = { diff, text: whole ? (n === d ? (whole + 1).toString() : whole + ' ' + n + '/' + d) : n + '/' + d };
          }
        });
        if (best.text) return best.text;
        return rounded.toString();
      }

      function updateFromTbsp() {
        const system = systemSelect.value;
        const factor = factors[system];
        const tbsp = parseFloat(tbspInput.value);
        if (isNaN(tbsp)) {
          cupsInput.value = '';
          cupsFraction.textContent = '(fraction: —)';
          return;
        }
        const cups = tbsp / factor;
        cupsInput.value = cups.toFixed(4).replace(/\.?0+$/, '');
        cupsFraction.textContent = '(fraction: ' + toFraction(cups) + ')';
      }

      function updateFromCups() {
        const system = systemSelect.value;
        const factor = factors[system];
        const cups = parseFloat(cupsInput.value);
        if (isNaN(cups)) {
          tbspInput.value = '';
          return;
        }
        const tbsp = cups * factor;
        tbspInput.value = tbsp.toFixed(2).replace(/\.?0+$/, '');
        cupsFraction.textContent = '(fraction: ' + toFraction(cups) + ')';
      }

      // Initial calculation
      updateFromTbsp();

      systemSelect.addEventListener('change', function() {
        if (direction === 'tbsp-to-cups') {
          updateFromTbsp();
        } else {
          updateFromCups();
        }
      });

      tbspInput.addEventListener('input', function() {
        if (direction === 'tbsp-to-cups') {
          updateFromTbsp();
        }
      });

      cupsInput.addEventListener('input', function() {
        if (direction === 'cups-to-tbsp') {
          updateFromCups();
        }
      });

      swapBtn.addEventListener('click', function() {
        if (direction === 'tbsp-to-cups') {
          direction = 'cups-to-tbsp';
          swapBtn.textContent = 'Swap direction (tbsp → cups)';
          // preserve current cups value, recalc tbsp
          updateFromCups();
        } else {
          direction = 'tbsp-to-cups';
          swapBtn.textContent = 'Swap direction (cups → tbsp)';
          updateFromTbsp();
        }
      });
    </script>
